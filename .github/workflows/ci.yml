# Проверки движка на PR (и вручную). Контент — корневой каталог `content/`; для Vite после npm ci создаётся связь `engine/public/content` (см. ensure-content-link.cjs).
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - name: Install dependencies
        working-directory: engine
        run: npm ci

      # Обязательный гейт: совпадает с прод-сборкой по сути (без base GitHub Pages).
      - name: Production build (Vite)
        working-directory: engine
        run: npm run build

      # ESLint: пока есть накопленный долг, не роняем job (см. вывод в логе).
      - name: ESLint
        continue-on-error: true
        working-directory: engine
        run: npm run lint

      # Обязательный гейт: пути flatArticles ↔ файлы в content/, внутренние ссылки, якоря.
      - name: Контент ↔ nav и внутренние ссылки
        working-directory: engine
        run: node scripts/check-internal-links.mjs
