# Проверки движка на PR (и вручную). Контент — git submodule (второй репозиторий), иначе
# ссылки и дерево статей не соответствуют тому, что у пользователя в браузере.
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (с submodules = репозиторий контента)
        uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-app/package-lock.json

      - name: Install dependencies
        working-directory: docs-app
        run: npm ci

      # Обязательный гейт: совпадает с прод-сборкой по сути (без base GitHub Pages).
      - name: Production build (Vite)
        working-directory: docs-app
        run: npm run build

      # Ниже — сигналы качества; пока есть накопленный долг, не роняем весь job.
      # Уберите continue-on-error, когда eslint и ссылки будут в норме.
      - name: ESLint
        continue-on-error: true
        working-directory: docs-app
        run: npm run lint

      - name: Внутренние ссылки и якоря (submodule + nav)
        continue-on-error: true
        working-directory: docs-app
        run: node scripts/check-internal-links.mjs
