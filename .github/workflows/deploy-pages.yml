# Публикует docs-app на GitHub Pages (project site).
# После первого push: Settings → Pages → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-app/package-lock.json

      - name: Install dependencies
        working-directory: docs-app
        run: npm ci

      # Подкаталог /medcontrol-docs-platform/ на github.io — иначе base '/' даёт 404 на JS/CSS
      # Текстовый PDF: задеплойте docs-app/pdf-server отдельно, в репозитории Settings → Secrets → Actions
      # добавьте VITE_PDF_SERVICE_URL (например https://your-pdf-api.fly.dev), см. pdf-server/README.md
      - name: Build
        working-directory: docs-app
        env:
          VITE_PDF_SERVICE_URL: ${{ secrets.VITE_PDF_SERVICE_URL }}
        run: npm run build:gh-pages

      - name: SPA fallback for GitHub Pages
        run: cp docs-app/dist/index.html docs-app/dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs-app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
